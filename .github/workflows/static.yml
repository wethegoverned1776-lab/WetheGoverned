name: Deploy Web (WASM) to GitHub Pages

on:
  push:
    branches: [ web-wasm ]
  workflow_dispatch:  # Allows manual trigger from GitHub

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'          # or 17 if you're using older version
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build WASM Web Distribution
        run: ./gradlew :shared:wasmJsBrowserDistribution --no-daemon

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: shared/build/dist/wasmJs/productionExecutable

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
